tool_timeout_sec = 120

[mcp_servers.github]
command = "bash"
args = ["-lc", "export GITHUB_PERSONAL_ACCESS_TOKEN=\"${GITHUB_READ_TOKEN}\"; exec npx -y @modelcontextprotocol/server-github"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"
