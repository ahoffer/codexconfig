[mcp_servers.desktop-commander]
command = "ssh"
args = ["clown-mcp", "mcpserve"]
startup_timeout_sec = 15
tool_timeout_sec = 120

[mcp_servers.ssh-mcp]
command = "ssh-mcp"
args = ["--host=clown", "--user=aaron", "--key=/home/aaron/.ssh/id_rsa", "--disableSudo"]
