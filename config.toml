approval_policy = "never"
sandbox_mode = "danger-full-access"
collaboration_mode_kind = "plan"

[features]
collaboration_modes = true

[analytics]
enabled = false

[feedback]
enabled = false

[otel]
exporter = "none"
log_user_prompt = false

[projects."/Users/aaron"]
trust_level = "trusted"

[projects."/Users/aaron/projects"]
trust_level = "trusted"

[mcp_servers.desktop-commander]
command = "ssh"
args = ["clown-mcp", "mcpserve"]
startup_timeout_sec = 15
tool_timeout_sec = 120

[mcp_servers.ssh-mcp]
command = "ssh-mcp"
args = ["--host=clown", "--user=aaron", "--key=/home/aaron/.ssh/id_rsa", "--disableSudo"]
startup_timeout_sec = 30
tool_timeout_sec = 120
