[projects."/Users/aaron/projects"]
trust_level = "trusted"

[projects."/home/aaron/bin"]
trust_level = "trusted"

[projects."/home/aaron"]
trust_level = "trusted"

[projects."/home/aaron/projects/cx-search.wiki"]
